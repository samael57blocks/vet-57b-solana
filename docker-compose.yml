# =============================================================================
# Solana + Anchor Development Environment
#
# Build (first time, ~30-40 min):
#   docker compose build
#
# Start an interactive shell:
#   docker compose run --rm dev
#
# Run Anchor tests (auto-starts/stops validator):
#   docker compose run --rm dev anchor test
#
# Build the Solana program:
#   docker compose run --rm dev anchor build
#
# Install JS deps + run tests manually:
#   docker compose run --rm dev bash -c "yarn install && yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.ts'"
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Solana development container (validator + Anchor CLI)
  # ---------------------------------------------------------------------------
  dev:
    build:
      context: .
      dockerfile: docker/solana-dev/Dockerfile
    image: vet-57b-solana-dev
    container_name: vet-57b-solana-dev
    volumes:
      # Mount the project at /workspace
      - ./:/workspace
      # Persist cargo registry and Solana keys between runs
      - cargo-cache:/root/.cargo
      - solana-config:/root/.config/solana
    working_dir: /workspace/solana
    stdin_open: true
    tty: true
    ports:
      - "8899:8899"   # Solana JSON RPC (for persistent validator)
      - "8900:8900"   # Solana WebSocket
    environment:
      - ANCHOR_WALLET=/root/.config/solana/id.json
      - RUST_BACKTRACE=1

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 database for the backend service
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: vet-57b-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vet57b
      POSTGRES_PASSWORD: vet57b
      POSTGRES_DB: vet57b
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vet57b"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Go backend service (REST API + Solana event indexer)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vet-57b-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Solana endpoint: points to the dev container's RPC and WS ports.
      SOLANA_RPC_URL: http://dev:8899
      SOLANA_WS_URL: ws://dev:8900
      # Anchor program ID — must be set or provided via .env.
      PROGRAM_ID: ${PROGRAM_ID:-}
      # PostgreSQL connection string — points to the db service.
      DATABASE_URL: postgres://vet57b:vet57b@db:5432/vet57b?sslmode=disable
      # HTTP server listen address.
      LISTEN_ADDR: :4000
      # Account polling interval.
      POLL_INTERVAL: 30s
      # Max WebSocket reconnection backoff.
      WS_MAX_BACKOFF: 60s
      # Path to the migrations directory inside the container.
      BACKEND_MIGRATIONS_DIR: internal/db/migrations
    depends_on:
      db:
        condition: service_healthy

volumes:
  cargo-cache:
  solana-config:
  pgdata:
